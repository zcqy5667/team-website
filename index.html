<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RoboMaster 单战队展示</title>
    <meta
      name="description"
      content="RoboMaster 机甲大师单战队展示站，包含首屏轮播、兵种功能、图片视频媒体展示。"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="RoboMaster 战队展示首页">
        <span class="brand-mark" data-team-logo>RM</span>
        <span class="brand-text" data-team-name>xxxx 战队</span>
      </a>
      <nav class="main-nav" aria-label="主导航">
        <a data-nav href="index.html">首页</a>
        <a data-nav href="index.html#team">战队</a>
        <a data-nav href="units.html">兵种</a>
        <a data-nav href="media.html">媒体</a>
      </nav>
    </header>

    <main>
      <section class="hero-slider" data-hero-slider aria-label="首页轮播">
        <div class="slide-track" data-slide-track></div>
        <button class="slide-arrow slide-arrow-prev" type="button" data-slide-prev aria-label="上一张">‹</button>
        <button class="slide-arrow slide-arrow-next" type="button" data-slide-next aria-label="下一张">›</button>
        <div class="slide-controls">
          <div class="slide-dots" data-slide-dots aria-label="轮播指示器"></div>
          <div class="slide-progress" data-slide-progress aria-hidden="true"></div>
        </div>
      </section>

      <section id="overview" class="section overview-section" aria-labelledby="overview-title">
        <div class="section-heading">
          <p class="eyebrow">Mission Overview</p>
          <h2 id="overview-title">从战队到赛场系统</h2>
        </div>
        <div class="overview-grid">
          <article class="metric-panel">
            <span class="metric-value" data-stat="teamCount">1</span>
            <span class="metric-label">展示战队</span>
          </article>
          <article class="metric-panel">
            <span class="metric-value" data-stat="unitCount">7</span>
            <span class="metric-label">兵种系统</span>
          </article>
          <article class="metric-panel">
            <span class="metric-value" data-stat="mediaCount">0</span>
            <span class="metric-label">媒体素材</span>
          </article>
        </div>
      </section>

      <section id="team" class="section team-section" aria-labelledby="team-title">
        <div class="section-heading">
          <p class="eyebrow">Team Profile</p>
          <h2 id="team-title">唯一战队展示</h2>
        </div>
        <div class="team-showcase">
          <div class="team-showcase-media">
            <img data-team-cover src="assets/images/team-placeholder.svg" alt="战队封面" loading="lazy" />
          </div>
          <div class="team-showcase-content">
            <p class="eyebrow" data-team-school>xxxx 大学</p>
            <h3 data-team-name>xxxx 战队</h3>
            <p class="team-slogan" data-team-slogan>为机甲而生，为热爱而战</p>
            <p data-team-summary>xxxx</p>
            <p data-team-detail>xxxx</p>
            <div data-team-tags></div>
            <div class="mini-stat-grid" data-team-stats></div>
          </div>
        </div>
      </section>

      <section id="units" class="section units-section" aria-labelledby="units-title">
        <div class="section-heading">
          <p class="eyebrow">Robot Classes</p>
          <h2 id="units-title">兵种功能预览</h2>
          <a class="text-link" href="units.html">查看完整兵种图鉴</a>
        </div>
        <div class="unit-grid unit-grid-preview" data-unit-preview></div>
      </section>

      <section id="media" class="section media-section" aria-labelledby="media-title">
        <div class="section-heading">
          <p class="eyebrow">Image / Video Bay</p>
          <h2 id="media-title">媒体素材预览</h2>
          <a class="text-link" href="media.html">进入媒体中心</a>
        </div>
        <div class="media-grid" data-media-preview></div>
      </section>
    </main>

    <footer class="site-footer">
      <span>RoboMaster Team Showcase</span>
      <span>Static, configurable, media-ready.</span>
    </footer>

    <script src="js/site-data.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
